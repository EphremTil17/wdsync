repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        files: ^(pyproject\.toml|src/.*\.py|tests/.*\.py)$
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        files: ^(src/.*\.py|tests/.*\.py)$
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|src/.*\.py|tests/.*\.py)$
